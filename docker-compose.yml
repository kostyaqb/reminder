services:
  reminder:
    build: .
    container_name: reminder-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data      # База данных
      - ./models:/app/models  # Модель распознавания
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
