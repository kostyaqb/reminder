version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: reminder_bot
    env_file: .env
    volumes:
      - ./app/data:/app/data          # для SQLite БД
      - ./app/models:/app/models      # для кэширования модели Whisper
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G                  # ограничиваем память (Whisper может жрать много)
